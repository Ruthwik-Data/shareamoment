<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Share a Moment | Coca-Cola AI Companion</title>

  <!-- Tailwind + Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lobster&display=swap" rel="stylesheet">

  <!-- React + ReactDOM + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Framer Motion + Confetti -->
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'coke-red': '#E41E2B',
            'coke-red-dark': '#D41E2B',
            'coke-dark': '#1A1A1A',
            'coke-white': '#FFFFFF',
            'coke-silver': '#F4F4F4',
          },
          fontFamily: {
            'brand': ['Poppins', 'sans-serif'],
            'script': ['Lobster', 'cursive'],
          }
        }
      }
    }
  </script>

  <style>
    html { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #E41E2B; border-radius: 10px; }

   .bottle-bubble-user {
      border-radius: 24px 24px 4px 24px;
    }
   .bottle-bubble-ai {
      border-radius: 24px 24px 24px 4px;
    }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
   .animate-bounce-dot {
      animation: bounce-dot 1.4s infinite ease-in-out both;
    }
  </style>
</head>
<body class="bg-coke-silver dark:bg-coke-dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.Motion;

    // ICONS as SVG components
    const FiSun = () => (
      <svg stroke="currentColor" fill="none" strokeWidth="2" viewBox="0 0 24 24" height="1em" width="1em">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    );

    const FiMoon = () => (
      <svg stroke="currentColor" fill="none" strokeWidth="2" viewBox="0 0 24 24" height="1em" width="1em">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    );

    const FiSend = () => (
      <svg stroke="currentColor" fill="none" strokeWidth="2" viewBox="0 0 24 24" height="1em" width="1em">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    );

    const FiHeart = () => (
      <svg stroke="currentColor" fill="none" strokeWidth="2" viewBox="0 0 24 24" height="1em" width="1em">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
    );

    const OPENAI_API_KEY = 'YOUR_OPENAI_KEY_HERE'; // Replace for live AI. Leave as-is for demo mode.

    const COKE_SYSTEM_PROMPT = `You are "Share a Moment", the Coca-Cola AI companion.

BRAND PERSONALITY:
- Friendly, energetic, optimistic, inclusive
- Speak like you're sharing a Coke with a friend: warm, uplifting, simple
- Focus on happiness, connection, and celebrating everyday moments
- Never be sarcastic, negative, or overly corporate

PERSONALIZATION:
- Use the user's name if provided from "Share a Coke" feature
- Adapt to their mood: if stressed, be calming; if excited, celebrate with them

PRODUCT SUGGESTIONS:
Party: Coca-Cola Classic, Coke Zero Sugar + lime
Workout: Powerade, Coca-Cola Energy
Movie Night: Coca-Cola Classic with popcorn
Travel: Mini cans, Coca-Cola Zero Sugar
Chill/Relax: Coke with ice, Sprite
Celebration: Coca-Cola Classic in glass bottle

RULES:
1. Keep responses under 80 words for mobile
2. End with a question when natural
3. Generate campaign slogan when asked: format "Taste [emotion/moment]"
4. Never claim to drink or have physical experiences`;

    const getMoodColor = (mood) => {
      switch(mood) {
        case 'celebrating': return '#FF1E2D';
        case 'chill': return '#C41E2B';
        case 'stressed': return '#A41E2B';
        default: return '#E41E2B';
      }
    };

    const demoResponses = {
      'Party Time 🎉': "Let's get this party started! Nothing beats an ice-cold Coca-Cola Classic or Coke Zero with lime when you're celebrating. Who are you sharing a moment with tonight?",
      'Movie Night 🍿': "Movie night = perfect pairing time! Grab a Coca-Cola Classic with your popcorn. The fizz + buttery popcorn is happiness in every sip. What are you watching?",
      'Need Energy ⚡': "I hear you! When you need that boost, try Coca-Cola Energy or Powerade to power through. You've got this! What's on your agenda?",
      'Just Happy 😄': "Love that energy! Happiness tastes better with a Coke in hand. Let's keep the good vibes going - what's making you smile today?",
      default: "That sounds like a perfect moment to share! How can I make it even more refreshing for you? Maybe I can suggest the perfect Coke for your vibe."
    };

    function ChatApp() {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: 'Hey there! I\'m here to Share a Moment with you 😊 What\'s your vibe today?' }
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [darkMode, setDarkMode] = useState(false);
      const [userName, setUserName] = useState('');
      const [mood, setMood] = useState(null);
      const [showNamePrompt, setShowNamePrompt] = useState(true);
      const messagesEndRef = useRef(null);

      const quickReplies = [
        { label: 'Party Time 🎉', mood: 'celebrating', product: 'Coke Zero' },
        { label: 'Movie Night 🍿', mood: 'chill', product: 'Classic' },
        { label: 'Need Energy ⚡', mood: 'stressed', product: 'Energy' },
        { label: 'Just Happy 😄', mood: 'happy', product: 'Coke' },
      ];

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      const getAIResponse = async (newMessages, selectedMood) => {
        // Demo mode if no API key
        if (OPENAI_API_KEY === 'YOUR_OPENAI_KEY_HERE') {
          await new Promise(r => setTimeout(r, 1200));
          const lastUserMsg = newMessages[newMessages.length - 1].content;
          return demoResponses[lastUserMsg] || demoResponses.default;
        }

        try {
          const contextualPrompt = userName
           ? `${COKE_SYSTEM_PROMPT}\nUser's name: ${userName}. Use it naturally.`
            : COKE_SYSTEM_PROMPT;
          const moodContext = selectedMood || mood? `\nUser's current mood: ${selectedMood || mood}. Match their energy.` : '';

          const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${OPENAI_API_KEY}`,
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: contextualPrompt + moodContext },
               ...newMessages
              ],
              temperature: 0.9,
              max_tokens: 150,
            }),
          });

          if (!response.ok) throw new Error('API error');
          const data = await response.json();
          return data.choices[0].message.content;
        } catch (error) {
          return "Oops! Can't connect right now. But every moment is better with a Coke! Try again?";
        }
      };

      const sendMessage = async (text, selectedMood) => {
        if (!text.trim()) return;

        if ('vibrate' in navigator) navigator.vibrate(10);

        const newMessages = [...messages, { role: 'user', content: text }];
        setMessages(newMessages);
        setInput('');
        setIsTyping(true);
        if (selectedMood) setMood(selectedMood);

        const aiText = await getAIResponse(newMessages, selectedMood);
        setIsTyping(false);
        setMessages([...newMessages, { role: 'assistant', content: aiText }]);
      };

      const handleShareACoke = () => {
        if (userName.trim()) {
          confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
          sendMessage(`My name is ${userName}`);
          setShowNamePrompt(false);
        }
      };

      const currentRed = getMoodColor(mood);

      return (
        <div className="flex flex-col h-[100dvh] max-w-lg mx-auto bg-coke-white dark:bg-coke-dark">
          {/* Header */}
          <header
            className="text-white p-4 flex justify-between items-center shadow-lg dark:backdrop-blur"
            style={{ backgroundColor: currentRed }}
          >
            <div>
              <h1 className="font-script text-2xl">Share a Moment</h1>
              <p className="text-xs opacity-90">Powered by Coca-Cola vibes</p>
            </div>
            <button
              onClick={() => setDarkMode(!darkMode)}
              className="p-2 rounded-full bg-white/20 hover:bg-white/30 transition"
              aria-label="Toggle theme"
            >
              {darkMode? <FiSun /> : <FiMoon />}
            </button>
          </header>

          {/* Share a Coke Banner */}
          <AnimatePresence>
            {showNamePrompt && (
              <motion.div
                initial={{ height: 0, opacity: 0 }}
                animate={{ height: 'auto', opacity: 1 }}
                exit={{ height: 0, opacity: 0 }}
                className="bg-gradient-to-r from-coke-red to-red-600 text-white p-3"
              >
                <div className="flex gap-2 items-center">
                  <FiHeart />
                  <input
                    type="text"
                    placeholder="Share a Coke with... your name?"
                    value={userName}
                    onChange={(e) => setUserName(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleShareACoke()}
                    className="flex-1 bg-white/20 placeholder-white/70 px-3 py-1 rounded-full text-sm outline-none"
                    maxLength={20}
                  />
                  <button
                    onClick={handleShareACoke}
                    className="bg-white text-coke-red px-4 py-1 rounded-full text-sm font-semibold hover:scale-105 transition"
                  >
                    Go
                  </button>
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto p-4 space-y-3">
            {messages.length === 1 && (
              <div className="text-center py-8">
                <div className="text-6xl mb-4">🥤</div>
                <h2 className="font-script text-2xl text-coke-red">Open Happiness</h2>
                <p className="text-sm opacity-70 mt-2">Try: "I'm hosting friends tonight"</p>
              </div>
            )}

            {messages.map((msg, i) => (
              <motion.div
                key={i}
                initial={{ opacity: 0, y: 10, scale: 0.8 }}
                animate={{ opacity: 1, y: 0, scale: 1 }}
                transition={{ type: "spring", stiffness: 500, damping: 30 }}
                className={`flex ${msg.role === 'user'? 'justify-end' : 'justify-start'}`}
              >
                <div
                  className={`max-w-[80%] px-4 py-2 ${
                    msg.role === 'user'
                     ? 'text-white bottle-bubble-user'
                      : 'bg-coke-silver dark:bg-gray-800 text-gray-900 dark:text-gray-100 bottle-bubble-ai'
                  }`}
                  style={msg.role === 'user'? { backgroundColor: currentRed } : {}}
                >
                  <p className="text-sm leading-relaxed">{msg.content}</p>
                </div>
              </motion.div>
            ))}

            {isTyping && (
              <div className="flex justify-start">
                <div className="bg-coke-silver dark:bg-gray-800 px-4 py-3 bottle-bubble-ai">
                  <div className="flex gap-1">
                    <div className="w-2 h-2 bg-gray-500 rounded-full animate-bounce-dot" />
                    <div className="w-2 h-2 bg-gray-500 rounded-full animate-bounce-dot" style={{ animationDelay: '0.2s' }} />
                    <div className="w-2 h-2 bg-gray-500 rounded-full animate-bounce-dot" style={{ animationDelay: '0.4s' }} />
                  </div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>

          {/* Quick Replies */}
          {messages.length <= 2 && (
            <div className="px-4 pb-2 flex gap-2 overflow-x-auto">
              {quickReplies.map((reply) => (
                <motion.button
                  key={reply.label}
                  whileHover={{ rotate: [-5, 5, -5, 0], transition: { duration: 0.5 } }}
                  onClick={() => sendMessage(reply.label, reply.mood)}
                  className="min-w-[120px] bg-white dark:bg-gray-800 rounded-2xl p-3 shadow-sm border border-gray-200 dark:border-gray-700 hover:shadow-md transition"
                >
                  <div className="text-3xl mb-1">🥤</div>
                  <p className="text-xs font-semibold text-coke-red">{reply.label}</p>
                  <p className="text-xs opacity-70">{reply.product}</p>
                </motion.button>
              ))}
            </div>
          )}

          {/* Input */}
          <div className="p-4 border-t border-gray-200 dark:border-gray-700">
            <div className="flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && sendMessage(input)}
                placeholder={userName? `What's up, ${userName}?` : "Type your moment..."}
                className="flex-1 bg-coke-silver dark:bg-gray-800 rounded-full px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-coke-red"
                style={{ fontSize: '16px' }}
              />
              <motion.button
                whileTap={{ scale: 0.95 }}
                onClick={() => sendMessage(input)}
                className="text-white p-3 rounded-full hover:scale-105 transition"
                style={{ backgroundColor: currentRed }}
                aria-label="Send message"
              >
                <FiSend />
              </motion.button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ChatApp />);
  </script>
</body>
</html>
